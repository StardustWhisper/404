# Nginx 配置示例 - 处理未知子域名
# 此文件展示如何在NPM服务器上配置通配符SSL证书和默认虚拟主机

# 默认服务器，处理未知子域名
server {
    listen 443 ssl default_server;
    server_name _;
    
    # 通配符SSL证书配置
    ssl_certificate /etc/ssl/certs/wildcard.yourdomain.com.crt;
    ssl_certificate_key /etc/ssl/private/wildcard.yourdomain.com.key;
    
    # SSL配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # 将所有未知子域名的请求重定向到404页面
    location / {
        return 301 https://yourdomain.com/404;
    }
}

# 已知子域名配置示例
server {
    listen 443 ssl;
    server_name www.yourdomain.com;
    
    # 使用相同的通配符SSL证书
    ssl_certificate /etc/ssl/certs/wildcard.yourdomain.com.crt;
    ssl_certificate_key /etc/ssl/private/wildcard.yourdomain.com.key;
    
    # SSL配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # 反向代理到你的应用
    location / {
        proxy_pass http://localhost:3000; # 你的应用端口
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 另一个已知子域名配置示例
server {
    listen 443 ssl;
    server_name app.yourdomain.com;
    
    # 使用相同的通配符SSL证书
    ssl_certificate /etc/ssl/certs/wildcard.yourdomain.com.crt;
    ssl_certificate_key /etc/ssl/private/wildcard.yourdomain.com.key;
    
    # SSL配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # 反向代理到另一个应用
    location / {
        proxy_pass http://localhost:8080; # 另一个应用端口
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP重定向到HTTPS
server {
    listen 80;
    server_name _;
    
    # 将所有HTTP请求重定向到HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
