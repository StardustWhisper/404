<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      color: #1890ff;
      text-align: center;
      margin-bottom: 30px;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: rgba(0, 0, 0, 0.85);
    }
    .random-image {
      width: 100%;
      height: auto;
      border-radius: 6px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .text {
      font-size: 14px;
      line-height: 1.5;
      color: rgba(0, 0, 0, 0.65);
    }
    .text-secondary {
      font-size: 12px;
      color: rgba(0, 0, 0, 0.45);
    }
    .text-strong {
      font-weight: 600;
    }
    .text-italic {
      font-style: italic;
    }
    .loading {
      text-align: center;
      padding: 50px;
    }
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      border-top: 4px solid #1890ff;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404 - 页面未找到</h1>
    <div class="card">
      <img id="random-image" class="random-image" src="https://picsum.photos/seed/404page/800/400.jpg" alt="Random">
    </div>
    <div class="grid">
      <div class="card">
        <div class="card-title">当前天气</div>
        <div id="weather-info" class="loading">
          <div class="spinner"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">今日新闻</div>
        <div id="news-info" class="loading">
          <div class="spinner"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">每日名言</div>
        <div id="quote-info" class="loading">
          <div class="spinner"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">USD/CNY 汇率</div>
        <div id="exchange-info" class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 模拟数据，以防API调用失败
    const fallbackData = {
      weather: {
        location: { name: "北京", country: "中国" },
        current: { temp_c: 22, condition: { text: "晴朗" } }
      },
      news: {
        title: "今日要闻：科技发展推动社会进步",
        publishedAt: new Date().toISOString()
      },
      quote: {
        content: "成功不是终点，失败也不是终结，唯有勇气才是永恒。",
        author: "温斯顿·丘吉尔"
      },
      exchangeRate: (7.2 + Math.random() * 0.2).toFixed(4)
    };

    // 获取天气信息
    async function fetchWeather() {
      try {
        const response = await fetch('https://api.weatherapi.com/v1/current.json?key=demo&q=Beijing&aqi=no');
        if (response.ok) {
          const data = await response.json();
          return data;
        }
        throw new Error('Weather API failed');
      } catch (error) {
        console.error('获取天气信息失败:', error);
        return fallbackData.weather;
      }
    }

    // 获取新闻信息
    async function fetchNews() {
      try {
        const response = await fetch('https://newsapi.org/v2/top-headlines?country=cn&apiKey=demo');
        if (response.ok) {
          const data = await response.json();
          return data.articles[0] || fallbackData.news;
        }
        throw new Error('News API failed');
      } catch (error) {
        console.error('获取新闻信息失败:', error);
        return fallbackData.news;
      }
    }

    // 获取名言信息
    async function fetchQuote() {
      try {
        const response = await fetch('https://api.quotable.io/random?maxLength=100');
        if (response.ok) {
          const data = await response.json();
          return data;
        }
        throw new Error('Quote API failed');
      } catch (error) {
        console.error('获取名言信息失败:', error);
        return fallbackData.quote;
      }
    }

    // 获取汇率信息
    async function fetchExchangeRate() {
      try {
        const response = await fetch('https://open.er-api.com/v6/latest/USD');
        if (response.ok) {
          const data = await response.json();
          return data.rates.CNY;
        }
        throw new Error('Exchange API failed');
      } catch (error) {
        console.error('获取汇率信息失败:', error);
        return fallbackData.exchangeRate;
      }
    }

    // 渲染天气信息
    function renderWeather(weather) {
      const weatherInfo = document.getElementById('weather-info');
      weatherInfo.innerHTML = `
        <div class="text">${weather.location.name}, ${weather.location.country}</div>
        <div class="text">温度: ${weather.current.temp_c}°C</div>
        <div class="text">天气: ${weather.current.condition.text}</div>
        <div class="text-secondary">📍 默认位置</div>
      `;
    }

    // 渲染新闻信息
    function renderNews(news) {
      const newsInfo = document.getElementById('news-info');
      const publishedDate = new Date(news.publishedAt).toLocaleDateString('zh-CN');
      newsInfo.innerHTML = `
        <div class="text text-strong">${news.title}</div>
        <div class="text-secondary">${publishedDate}</div>
      `;
    }

    // 渲染名言信息
    function renderQuote(quote) {
      const quoteInfo = document.getElementById('quote-info');
      quoteInfo.innerHTML = `
        <div class="text text-italic">"${quote.content}"</div>
        <div class="text-secondary">— ${quote.author}</div>
      `;
    }

    // 渲染汇率信息
    function renderExchangeRate(rate) {
      const exchangeInfo = document.getElementById('exchange-info');
      const updateTime = new Date().toLocaleString('zh-CN');
      exchangeInfo.innerHTML = `
        <div class="text">1 USD = ${rate} CNY</div>
        <div class="text-secondary">更新时间: ${updateTime}</div>
      `;
    }

    // 初始化页面
    async function init() {
      // 获取并渲染天气信息
      const weather = await fetchWeather();
      renderWeather(weather);

      // 获取并渲染新闻信息
      const news = await fetchNews();
      renderNews(news);

      // 获取并渲染名言信息
      const quote = await fetchQuote();
      renderQuote(quote);

      // 获取并渲染汇率信息
      const exchangeRate = await fetchExchangeRate();
      renderExchangeRate(exchangeRate);
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
